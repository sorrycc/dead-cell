<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Dead Cell</title>
  <style>
    /* Reset + full-screen mount. The Phaser canvas runs at a FIXED design resolution
       (see src/config/constants.js) and is letterboxed by Scale.FIT (design §6.0,
       Decision 8). The page background shows through the letterbox bars, so a dark
       slate keeps the primitive rectangles reading cleanly against it. No fonts or
       external assets are loaded — programmer-art only (Decision 4). */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0b0e14;
    }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      -webkit-user-select: none; user-select: none;
    }
    /* Phaser injects its <canvas> into #game; centered + letterboxed by Scale.FIT. */
    #game { position: fixed; inset: 0; }
    #game canvas { display: block; margin: 0 auto; touch-action: none; }
  </style>
</head>
<body>
  <div id="game"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
