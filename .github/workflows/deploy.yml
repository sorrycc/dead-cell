name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch: # manual "Run workflow" button

# Allow the workflow to publish to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-progress one
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Quality gate (design Decision 81a): the headless determinism/bounds/
      # traversability + pure-config sweep (scripts/verify-gen.mjs) must pass
      # BEFORE the build, so a broken generator fails CI instead of shipping.
      - run: npm run verify
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
